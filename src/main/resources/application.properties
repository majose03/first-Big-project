# ─── CRUMB 2.0 — Spring Boot + MongoDB Atlas ─────────────────────────────
server.port=8080

# ── MySQL Database Connection ──────────────────────────────────────────────
# To run locally: Use your IDE or use `mvn spring-boot:run`
# To run specifically with online DB: Use `mvn spring-boot:run -Dspring-boot.run.profiles=prod`
# Default to "dev" profile (local database)
spring.profiles.active=dev

# --- DEVELOPMENT PROFILE (Local MySQL) ---
spring.config.activate.on-profile=dev
spring.datasource.url=jdbc:mysql://localhost:3306/bakerydb?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=${MYSQL_PASSWORD:root}

# --- PRODUCTION PROFILE (Aiven Online MySQL) ---
spring.config.activate.on-profile=prod
spring.datasource.url=jdbc:mysql://mysql-3f077388-sahayamajose-dfff.j.aivencloud.com:23469/defaultdb?sslMode=REQUIRED
spring.datasource.username=avnadmin
spring.datasource.password=${AIVEN_DB_PASSWORD}

# --- SHARED HIBERNATE SETTINGS ---
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

# ── Application ──────────────────────────────────────────────────────────
spring.application.name=crumb-bakery-v2
spring.jackson.serialization.write-dates-as-timestamps=false

# ── Static resources — NO CACHE (always serve fresh files) ───────────────
spring.web.resources.static-locations=classpath:/static/
spring.web.resources.cache.period=0
spring.web.resources.cache.cachecontrol.no-cache=true
spring.web.resources.cache.cachecontrol.no-store=true
spring.web.resources.cache.cachecontrol.must-revalidate=true

# ── Logging ──────────────────────────────────────────────────────────────
logging.level.com.crumb=INFO
