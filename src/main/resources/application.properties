# ─── CRUMB 2.0 — Spring Boot + MongoDB Atlas ─────────────────────────────
server.port=8080

# ── MongoDB Atlas ──────────────────────────────────────────────────────────
# Set your Atlas URI as environment variable MONGO_URI, or paste it below
# Get free cluster at: https://www.mongodb.com/cloud/atlas/register
spring.data.mongodb.uri=mongodb+srv://majo:Majo12345@cluster0.dp5zubv.mongodb.net/bakerydb?appName=Cluster0
spring.data.mongodb.database=bakerydb

# ── Application ──────────────────────────────────────────────────────────
spring.application.name=crumb-bakery-v2
spring.jackson.serialization.write-dates-as-timestamps=false

# ── Static resources — NO CACHE (always serve fresh files) ───────────────
spring.web.resources.static-locations=classpath:/static/
spring.web.resources.cache.period=0
spring.web.resources.cache.cachecontrol.no-cache=true
spring.web.resources.cache.cachecontrol.no-store=true
spring.web.resources.cache.cachecontrol.must-revalidate=true

# ── Logging ──────────────────────────────────────────────────────────────
logging.level.com.crumb=INFO
logging.level.org.springframework.data.mongodb=WARN
