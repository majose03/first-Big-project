<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title th:text="${pageTitle}">Login — BakeryHub</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css"/>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css"/>
  <link rel="stylesheet" th:href="@{/css/style.css}"/>
</head>
<body style="background:linear-gradient(135deg,#fdf0e8,#fff9f5);min-height:100vh">

<div style="padding:1.2rem 2rem;background:var(--dark)">
  <a th:href="@{/}" style="font-family:'Playfair Display',serif;font-size:1.4rem;color:var(--accent);text-decoration:none;font-weight:700">
    🍰 BakeryHub
  </a>
</div>

<div class="auth-card">
  <h2 style="font-family:'Playfair Display',serif;font-weight:700;margin-bottom:.3rem">Welcome Back!</h2>
  <p style="color:var(--text-muted);font-size:.9rem;margin-bottom:1.8rem">Sign in to your BakeryHub account</p>

  <div th:if="${errorMessage}" class="alert-bakeryhub alert-danger-custom">
    <i class="bi bi-exclamation-triangle-fill me-2"></i><span th:text="${errorMessage}"></span>
  </div>
  <div th:if="${successMessage}" class="alert-bakeryhub alert-success-custom">
    <i class="bi bi-check-circle-fill me-2"></i><span th:text="${successMessage}"></span>
  </div>

  <form th:action="@{/auth/login}" method="post">
    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>

    <div class="mb-3">
      <label style="font-weight:600;font-size:.92rem;margin-bottom:.4rem;display:block">Username</label>
      <input type="text" name="username" class="form-control-custom" placeholder="Enter your username"
             required autofocus autocomplete="username"/>
    </div>

    <div class="mb-4">
      <label style="font-weight:600;font-size:.92rem;margin-bottom:.4rem;display:block">Password</label>
      <input type="password" name="password" class="form-control-custom" placeholder="Enter your password"
             required autocomplete="current-password"/>
    </div>

    <button type="submit" class="btn-primary-custom">
      <i class="bi bi-box-arrow-in-right me-2"></i>Sign In
    </button>
  </form>

  <div style="text-align:center;margin-top:1.5rem">
    <span style="color:var(--text-muted);font-size:.9rem">Don't have an account?</span>
    <a th:href="@{/auth/signup}" style="color:var(--primary);font-weight:600;text-decoration:none;margin-left:.3rem">Sign Up</a>
  </div>
  <div style="text-align:center;margin-top:1rem">
    <a th:href="@{/}" style="color:var(--text-muted);font-size:.85rem;text-decoration:none">
      <i class="bi bi-arrow-left me-1"></i>Back to Home
    </a>
  </div>

  <!-- Admin hint (dev only) -->
  <div style="margin-top:1.5rem;padding:1rem;background:var(--surface);border-radius:8px;border:1px dashed var(--border)">
    <p style="font-size:.78rem;color:var(--text-muted);margin:0;text-align:center">
      <strong>Admin:</strong> username <code>admin</code> / password <code>admin123</code><br>
      <span style="font-size:.72rem">(Insert seed data via <code>schema.sql</code> comments)</span>
    </p>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js"></script>
<script th:src="@{/js/main.js}"></script>
</body>
</html>
