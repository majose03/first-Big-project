<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title th:text="${pageTitle}">Sign Up — BakeryHub</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css"/>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css"/>
  <link rel="stylesheet" th:href="@{/css/style.css}"/>
</head>
<body style="background:linear-gradient(135deg,#fdf0e8,#fff9f5);min-height:100vh">

<div style="padding:1.2rem 2rem;background:var(--dark)">
  <a th:href="@{/}" style="font-family:'Playfair Display',serif;font-size:1.4rem;color:var(--accent);text-decoration:none;font-weight:700">
    🍰 BakeryHub
  </a>
</div>

<div class="auth-card" style="max-width:500px">
  <h2 style="font-family:'Playfair Display',serif;font-weight:700;margin-bottom:.3rem">Create Account</h2>
  <p style="color:var(--text-muted);font-size:.9rem;margin-bottom:1.8rem">Join BakeryHub for exclusive deals &amp; easy ordering</p>

  <div th:if="${errorMessage}" class="alert-bakeryhub alert-danger-custom">
    <i class="bi bi-exclamation-triangle-fill me-2"></i><span th:text="${errorMessage}"></span>
  </div>
  <div th:if="${successMessage}" class="alert-bakeryhub alert-success-custom">
    <i class="bi bi-check-circle-fill me-2"></i><span th:text="${successMessage}"></span>
  </div>

  <form th:action="@{/auth/signup}" method="post">
    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>

    <div class="mb-3">
      <label style="font-weight:600;font-size:.92rem;margin-bottom:.4rem;display:block">Username</label>
      <input type="text" name="username" class="form-control-custom" placeholder="Choose a username"
             required minlength="3" autocomplete="username"/>
    </div>

    <div class="mb-3">
      <label style="font-weight:600;font-size:.92rem;margin-bottom:.4rem;display:block">Email Address</label>
      <input type="email" name="email" class="form-control-custom" placeholder="you@example.com"
             required autocomplete="email"/>
    </div>

    <div class="mb-3">
      <label style="font-weight:600;font-size:.92rem;margin-bottom:.4rem;display:block">Password</label>
      <input type="password" name="password" class="form-control-custom" placeholder="Min. 6 characters"
             required minlength="6" autocomplete="new-password"/>
    </div>

    <div class="mb-4">
      <label style="font-weight:600;font-size:.92rem;margin-bottom:.4rem;display:block">Confirm Password</label>
      <input type="password" name="confirmPassword" class="form-control-custom" placeholder="Repeat password"
             required autocomplete="new-password"/>
    </div>

    <button type="submit" class="btn-primary-custom">
      <i class="bi bi-person-plus-fill me-2"></i>Create Account
    </button>
  </form>

  <div style="text-align:center;margin-top:1.5rem">
    <span style="color:var(--text-muted);font-size:.9rem">Already have an account?</span>
    <a th:href="@{/auth/login}" style="color:var(--primary);font-weight:600;text-decoration:none;margin-left:.3rem">Sign In</a>
  </div>
  <div style="text-align:center;margin-top:1rem">
    <a th:href="@{/}" style="color:var(--text-muted);font-size:.85rem;text-decoration:none">
      <i class="bi bi-arrow-left me-1"></i>Back to Home
    </a>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js"></script>
<script th:src="@{/js/main.js}"></script>
</body>
</html>
