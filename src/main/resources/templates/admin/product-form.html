<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title th:text="${pageTitle}">Product Form — BakeryHub Admin</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css"/>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css"/>
  <link rel="stylesheet" th:href="@{/css/style.css}"/>
</head>
<body style="background:#f8f0eb">

<nav style="background:var(--dark);padding:1rem 2rem;display:flex;align-items:center;justify-content:space-between">
  <a th:href="@{/}" style="font-family:'Playfair Display',serif;font-size:1.4rem;color:var(--accent);text-decoration:none;font-weight:700">🍰 BakeryHub Admin</a>
  <form th:action="@{/auth/logout}" method="post" style="margin:0">
    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
    <button type="submit" style="background:transparent;border:1px solid rgba(255,255,255,.3);color:rgba(255,255,255,.7);padding:.3rem .9rem;border-radius:6px;cursor:pointer;font-size:.85rem">
      <i class="bi bi-box-arrow-right me-1"></i>Logout
    </button>
  </form>
</nav>

<div class="container-fluid" style="max-width:800px;margin:0 auto;padding:2rem">

  <div class="d-flex align-items-center gap-2 mb-4">
    <a th:href="@{/admin/products}" style="color:var(--primary);text-decoration:none">
      <i class="bi bi-arrow-left me-1"></i>Back to Products
    </a>
  </div>

  <div style="background:#fff;border:1px solid var(--border);border-radius:var(--radius);padding:2.5rem;box-shadow:var(--shadow-sm)">
    <h3 style="font-family:'Playfair Display',serif;font-weight:700;margin-bottom:2rem"
        th:text="${formTitle}">Product Form</h3>

    <form th:action="@{/admin/products/save}" method="post" th:object="${product}">
      <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
      <input type="hidden" th:field="*{id}"/>
      <input type="hidden" th:field="*{active}" th:value="true"/>

      <div class="row g-3">
        <!-- Name -->
        <div class="col-12">
          <label style="font-weight:600;font-size:.92rem;margin-bottom:.4rem;display:block">Product Name *</label>
          <input type="text" th:field="*{name}" class="form-control-custom" placeholder="e.g. Chocolate Fudge Cake" required/>
          <div th:if="${#fields.hasErrors('name')}" style="color:var(--danger);font-size:.8rem;margin-top:.3rem" th:errors="*{name}"></div>
        </div>

        <!-- Description -->
        <div class="col-12">
          <label style="font-weight:600;font-size:.92rem;margin-bottom:.4rem;display:block">Description</label>
          <textarea th:field="*{description}" class="form-control-custom" rows="3"
                    placeholder="Describe the product, flavours, occasion…" style="resize:vertical"></textarea>
        </div>

        <!-- Price & Category -->
        <div class="col-sm-6">
          <label style="font-weight:600;font-size:.92rem;margin-bottom:.4rem;display:block">Price (₹) *</label>
          <input type="number" th:field="*{price}" step="0.01" min="0.01" class="form-control-custom"
                 placeholder="e.g. 349.00" required/>
          <div th:if="${#fields.hasErrors('price')}" style="color:var(--danger);font-size:.8rem;margin-top:.3rem" th:errors="*{price}"></div>
        </div>
        <div class="col-sm-6">
          <label style="font-weight:600;font-size:.92rem;margin-bottom:.4rem;display:block">Category *</label>
          <select th:field="*{category}" class="form-control-custom" required>
            <option value="">-- Select Category --</option>
            <option value="Cake">🎂 Cake</option>
            <option value="Brownie">🍫 Brownie</option>
            <option value="Cupcake">🧁 Cupcake</option>
            <option value="Cookie">🍪 Cookie</option>
            <option value="Pastry">🥐 Pastry</option>
            <option value="Other">Other</option>
          </select>
          <div th:if="${#fields.hasErrors('category')}" style="color:var(--danger);font-size:.8rem;margin-top:.3rem" th:errors="*{category}"></div>
        </div>

        <!-- Image URL -->
        <div class="col-12">
          <label style="font-weight:600;font-size:.92rem;margin-bottom:.4rem;display:block">Image URL</label>
          <input type="url" th:field="*{imageUrl}" class="form-control-custom"
                 placeholder="https://images.example.com/my-cake.jpg"
                 id="imageUrlInput"/>
          <p style="font-size:.78rem;color:var(--text-muted);margin-top:.3rem">
            Paste a direct image URL (e.g. from Unsplash or your CDN). Recommended: 600×600px.
          </p>
          <!-- Preview -->
          <div id="imagePreviewWrap" style="margin-top:.7rem;display:none">
            <img id="imagePreview" src="" alt="Preview" style="max-height:150px;border-radius:var(--radius-sm);border:1px solid var(--border);object-fit:cover"/>
          </div>
        </div>

        <!-- Stock -->
        <div class="col-sm-6">
          <label style="font-weight:600;font-size:.92rem;margin-bottom:.4rem;display:block">Stock Quantity</label>
          <input type="number" th:field="*{stock}" min="0" class="form-control-custom" placeholder="e.g. 20"/>
        </div>

        <!-- Checkboxes -->
        <div class="col-12">
          <label style="font-weight:600;font-size:.92rem;margin-bottom:.7rem;display:block">Product Tags</label>
          <div style="display:flex;gap:1.5rem;flex-wrap:wrap">
            <label style="display:flex;align-items:center;gap:.5rem;cursor:pointer;font-size:.92rem">
              <input type="checkbox" th:field="*{bestSeller}" style="width:16px;height:16px;accent-color:var(--primary)"/>
              ★ Best Seller
            </label>
            <label style="display:flex;align-items:center;gap:.5rem;cursor:pointer;font-size:.92rem">
              <input type="checkbox" th:field="*{eggless}" style="width:16px;height:16px;accent-color:var(--primary)"/>
              🌿 Eggless
            </label>
            <label style="display:flex;align-items:center;gap:.5rem;cursor:pointer;font-size:.92rem">
              <input type="checkbox" th:field="*{glutenFree}" style="width:16px;height:16px;accent-color:var(--primary)"/>
              🌾 Gluten-Free
            </label>
          </div>
        </div>

        <!-- Submit Buttons -->
        <div class="col-12 d-flex gap-3 mt-2">
          <button type="submit" class="btn-primary-custom" style="width:auto;padding:.7rem 2.2rem">
            <i class="bi bi-check2-circle me-2"></i>Save Product
          </button>
          <a th:href="@{/admin/products}"
             style="background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-sm);padding:.7rem 1.5rem;text-decoration:none;color:var(--text-main);font-weight:500;transition:all .2s;display:flex;align-items:center">
            Cancel
          </a>
        </div>
      </div>
    </form>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js"></script>
<script th:src="@{/js/main.js}"></script>
<script>
  // Live image URL preview
  const urlInput = document.getElementById('imageUrlInput');
  const preview = document.getElementById('imagePreview');
  const wrap = document.getElementById('imagePreviewWrap');
  if (urlInput && preview) {
    function updatePreview() {
      const url = urlInput.value.trim();
      if (url) { preview.src = url; wrap.style.display = 'block'; }
      else { wrap.style.display = 'none'; }
    }
    urlInput.addEventListener('input', updatePreview);
    updatePreview(); // on page load for edit mode
  }
</script>
</body>
</html>
