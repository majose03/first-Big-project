<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title th:text="${pageTitle}">Admin Dashboard — BakeryHub</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css"/>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css"/>
  <link rel="stylesheet" th:href="@{/css/style.css}"/>
</head>
<body style="background:#f8f0eb">

<!-- Admin Topbar -->
<nav style="background:var(--dark);padding:1rem 2rem;display:flex;align-items:center;justify-content:space-between">
  <a th:href="@{/}" style="font-family:'Playfair Display',serif;font-size:1.4rem;color:var(--accent);text-decoration:none;font-weight:700">
    🍰 BakeryHub <span style="font-size:.75rem;font-family:'Inter',sans-serif;font-weight:400;color:rgba(255,255,255,.5);margin-left:.4rem">Admin Panel</span>
  </a>
  <div style="display:flex;gap:1rem;align-items:center">
    <span style="color:rgba(255,255,255,.65);font-size:.85rem" sec:authentication="name">Admin</span>
    <form th:action="@{/auth/logout}" method="post" style="margin:0">
      <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
      <button type="submit" style="background:transparent;border:1px solid rgba(255,255,255,.3);color:rgba(255,255,255,.7);padding:.3rem .9rem;border-radius:6px;cursor:pointer;font-size:.85rem">
        <i class="bi bi-box-arrow-right me-1"></i>Logout
      </button>
    </form>
  </div>
</nav>

<div class="container-fluid" style="max-width:1200px;margin:0 auto;padding:2rem">

  <!-- Flash -->
  <div th:if="${successMessage}" class="alert-bakeryhub alert-success-custom">
    <i class="bi bi-check-circle-fill me-2"></i><span th:text="${successMessage}"></span>
  </div>

  <!-- Admin Nav Pills -->
  <ul class="nav nav-pills gap-2 mb-4">
    <li class="nav-item"><a class="nav-link active" th:href="@{/admin}" style="background:var(--primary)">📊 Dashboard</a></li>
    <li class="nav-item"><a class="nav-link" th:href="@{/admin/products}" style="color:var(--text-main)">🍰 Products</a></li>
    <li class="nav-item"><a class="nav-link" th:href="@{/admin/contacts}" style="color:var(--text-main)">
      ✉️ Inquiries
      <span th:if="${unreadInquiries > 0}"
            style="background:var(--accent);color:var(--dark);border-radius:50px;padding:1px 7px;font-size:.75rem;font-weight:700;margin-left:.3rem"
            th:text="${unreadInquiries}"></span>
    </a></li>
    <li class="nav-item ms-auto"><a class="nav-link" th:href="@{/}" style="color:var(--text-muted)">← Back to Site</a></li>
  </ul>

  <!-- Stat Cards -->
  <div class="row g-4 mb-5">
    <div class="col-sm-4">
      <div class="admin-stat-card">
        <div style="font-size:2.5rem;font-weight:700;font-family:'Playfair Display',serif" th:text="${totalProducts}">0</div>
        <div style="opacity:.9;margin-top:.3rem">Total Products</div>
        <i class="bi bi-box-seam" style="position:absolute;right:1.5rem;top:1.5rem;font-size:2rem;opacity:.25"></i>
      </div>
    </div>
    <div class="col-sm-4">
      <div class="admin-stat-card" style="background:linear-gradient(135deg,#2e7d32,#4caf50)">
        <div style="font-size:2.5rem;font-weight:700;font-family:'Playfair Display',serif" th:text="${totalUsers}">0</div>
        <div style="opacity:.9;margin-top:.3rem">Registered Users</div>
        <i class="bi bi-people-fill" style="position:absolute;right:1.5rem;top:1.5rem;font-size:2rem;opacity:.25"></i>
      </div>
    </div>
    <div class="col-sm-4">
      <div class="admin-stat-card" style="background:linear-gradient(135deg,#d4a80e,var(--accent))">
        <div style="font-size:2.5rem;font-weight:700;font-family:'Playfair Display',serif;color:var(--dark)" th:text="${unreadInquiries}">0</div>
        <div style="opacity:.9;margin-top:.3rem;color:var(--dark)">Unread Inquiries</div>
        <i class="bi bi-envelope-fill" style="position:absolute;right:1.5rem;top:1.5rem;font-size:2rem;opacity:.25;color:var(--dark)"></i>
      </div>
    </div>
  </div>

  <!-- Quick Actions -->
  <div class="row g-3 mb-5">
    <div class="col-12">
      <h4 style="font-family:'Playfair Display',serif;font-weight:700;margin-bottom:1rem">Quick Actions</h4>
    </div>
    <div class="col-sm-6 col-lg-3">
      <a th:href="@{/admin/products/new}"
         style="display:block;background:#fff;border:1.5px solid var(--border);border-radius:var(--radius);padding:1.2rem;text-align:center;text-decoration:none;transition:all .3s ease"
         onmouseover="this.style.borderColor='var(--primary)';this.style.transform='translateY(-3px)'"
         onmouseout="this.style.borderColor='var(--border)';this.style.transform='translateY(0)'">
        <div style="font-size:2rem;margin-bottom:.5rem">➕</div>
        <div style="font-weight:600;color:var(--text-main)">Add Product</div>
      </a>
    </div>
    <div class="col-sm-6 col-lg-3">
      <a th:href="@{/admin/products}"
         style="display:block;background:#fff;border:1.5px solid var(--border);border-radius:var(--radius);padding:1.2rem;text-align:center;text-decoration:none;transition:all .3s ease"
         onmouseover="this.style.borderColor='var(--primary)';this.style.transform='translateY(-3px)'"
         onmouseout="this.style.borderColor='var(--border)';this.style.transform='translateY(0)'">
        <div style="font-size:2rem;margin-bottom:.5rem">📦</div>
        <div style="font-weight:600;color:var(--text-main)">Manage Products</div>
      </a>
    </div>
    <div class="col-sm-6 col-lg-3">
      <a th:href="@{/admin/contacts}"
         style="display:block;background:#fff;border:1.5px solid var(--border);border-radius:var(--radius);padding:1.2rem;text-align:center;text-decoration:none;transition:all .3s ease"
         onmouseover="this.style.borderColor='var(--primary)';this.style.transform='translateY(-3px)'"
         onmouseout="this.style.borderColor='var(--border)';this.style.transform='translateY(0)'">
        <div style="font-size:2rem;margin-bottom:.5rem">✉️</div>
        <div style="font-weight:600;color:var(--text-main)">View Inquiries</div>
      </a>
    </div>
    <div class="col-sm-6 col-lg-3">
      <a th:href="@{/products}"
         style="display:block;background:#fff;border:1.5px solid var(--border);border-radius:var(--radius);padding:1.2rem;text-align:center;text-decoration:none;transition:all .3s ease"
         onmouseover="this.style.borderColor='var(--primary)';this.style.transform='translateY(-3px)'"
         onmouseout="this.style.borderColor='var(--border)';this.style.transform='translateY(0)'">
        <div style="font-size:2rem;margin-bottom:.5rem">🌐</div>
        <div style="font-weight:600;color:var(--text-main)">View Shop</div>
      </a>
    </div>
  </div>

  <!-- Recent Inquiries -->
  <div th:if="${recentInquiries != null and !recentInquiries.isEmpty()}">
    <h4 style="font-family:'Playfair Display',serif;font-weight:700;margin-bottom:1rem">Recent Unread Inquiries</h4>
    <div style="background:#fff;border:1px solid var(--border);border-radius:var(--radius);overflow:hidden">
      <table class="table table-hover mb-0">
        <thead style="background:var(--surface)">
          <tr>
            <th style="padding:.85rem 1rem;font-weight:600;font-size:.88rem">Name</th>
            <th style="padding:.85rem 1rem;font-weight:600;font-size:.88rem">Subject</th>
            <th style="padding:.85rem 1rem;font-weight:600;font-size:.88rem">Date</th>
          </tr>
        </thead>
        <tbody>
          <tr th:each="contact : ${recentInquiries}">
            <td style="padding:.85rem 1rem;font-size:.9rem" th:text="${contact.name}">Name</td>
            <td style="padding:.85rem 1rem;font-size:.9rem" th:text="${contact.subject}">Subject</td>
            <td style="padding:.85rem 1rem;font-size:.82rem;color:var(--text-muted)"
                th:text="${#temporals.format(contact.submittedAt, 'dd MMM, HH:mm')}">Date</td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js"></script>
<script th:src="@{/js/main.js}"></script>
</body>
</html>
