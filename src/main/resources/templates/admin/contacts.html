<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title th:text="${pageTitle}">Customer Inquiries — BakeryHub</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css"/>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css"/>
  <link rel="stylesheet" th:href="@{/css/style.css}"/>
</head>
<body style="background:#f8f0eb">

<nav style="background:var(--dark);padding:1rem 2rem;display:flex;align-items:center;justify-content:space-between">
  <a th:href="@{/}" style="font-family:'Playfair Display',serif;font-size:1.4rem;color:var(--accent);text-decoration:none;font-weight:700">🍰 BakeryHub Admin</a>
  <form th:action="@{/auth/logout}" method="post" style="margin:0">
    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
    <button type="submit" style="background:transparent;border:1px solid rgba(255,255,255,.3);color:rgba(255,255,255,.7);padding:.3rem .9rem;border-radius:6px;cursor:pointer;font-size:.85rem">
      <i class="bi bi-box-arrow-right me-1"></i>Logout
    </button>
  </form>
</nav>

<div class="container-fluid" style="max-width:1200px;margin:0 auto;padding:2rem">

  <ul class="nav nav-pills gap-2 mb-4">
    <li class="nav-item"><a class="nav-link" th:href="@{/admin}" style="color:var(--text-muted)">📊 Dashboard</a></li>
    <li class="nav-item"><a class="nav-link" th:href="@{/admin/products}" style="color:var(--text-main)">🍰 Products</a></li>
    <li class="nav-item"><a class="nav-link active" th:href="@{/admin/contacts}" style="background:var(--primary)">✉️ Inquiries</a></li>
    <li class="nav-item ms-auto"><a class="nav-link" th:href="@{/}" style="color:var(--text-muted)">← Back to Site</a></li>
  </ul>

  <div class="d-flex justify-content-between align-items-center mb-4 flex-wrap gap-2">
    <h3 style="font-family:'Playfair Display',serif;font-weight:700;margin:0">Customer Inquiries</h3>
    <span th:if="${unreadCount > 0}"
          style="background:var(--accent);color:var(--dark);border-radius:50px;padding:.3rem 1rem;font-size:.85rem;font-weight:700">
      <span th:text="${unreadCount}">0</span> unread
    </span>
  </div>

  <div th:if="${contacts == null or contacts.isEmpty()}"
       style="background:#fff;border-radius:var(--radius);padding:3rem;text-align:center;border:1px solid var(--border)">
    <div style="font-size:3rem">📭</div>
    <p style="color:var(--text-muted);margin-top:1rem">No inquiries yet.</p>
  </div>

  <div th:each="contact : ${contacts}"
       th:style="${!contact.read} ? 'background:#fff9f5;border:1.5px solid rgba(181,69,27,.25)' : 'background:#fff;border:1px solid var(--border)'"
       style="border-radius:var(--radius);padding:1.5rem;margin-bottom:1rem;transition:all .2s">
    <div style="display:flex;justify-content:space-between;align-items:flex-start;gap:1rem;flex-wrap:wrap">
      <div style="flex:1">
        <div style="display:flex;align-items:center;gap:.6rem;margin-bottom:.3rem">
          <span th:unless="${contact.read}"
                style="background:var(--primary);color:#fff;border-radius:50px;padding:.15rem .65rem;font-size:.72rem;font-weight:700">NEW</span>
          <strong th:text="${contact.name}">Name</strong>
          <span style="color:var(--text-muted);font-size:.85rem">·</span>
          <span style="color:var(--text-muted);font-size:.85rem" th:text="${contact.email}">email</span>
          <span th:if="${contact.phone != null and !#strings.isEmpty(contact.phone)}"
                style="color:var(--text-muted);font-size:.85rem">· <span th:text="${contact.phone}">phone</span></span>
        </div>
        <div style="font-weight:600;margin-bottom:.4rem" th:text="${contact.subject}">Subject</div>
        <div style="color:var(--text-muted);font-size:.9rem;line-height:1.6" th:text="${contact.message}">Message</div>
        <div style="font-size:.78rem;color:rgba(0,0,0,.4);margin-top:.6rem"
             th:text="${#temporals.format(contact.submittedAt, 'dd MMMM yyyy, HH:mm')}">Date</div>
      </div>
      <div style="display:flex;gap:.5rem;flex-shrink:0">
        <form th:if="${!contact.read}" th:action="@{/admin/contacts/read/{id}(id=${contact.id})}" method="post">
          <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
          <button type="submit"
                  style="background:var(--surface);border:1px solid var(--border);border-radius:6px;padding:.35rem .7rem;cursor:pointer;font-size:.82rem;color:var(--text-main)">
            <i class="bi bi-check2"></i> Mark Read
          </button>
        </form>
        <form th:action="@{/admin/contacts/delete/{id}(id=${contact.id})}" method="post"
              onsubmit="return confirm('Delete this inquiry?')">
          <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
          <button type="submit"
                  style="background:#ffebee;border:1px solid #ffcdd2;border-radius:6px;padding:.35rem .7rem;cursor:pointer;font-size:.82rem;color:#c62828">
            <i class="bi bi-trash3"></i>
          </button>
        </form>
      </div>
    </div>
  </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js"></script>
<script th:src="@{/js/main.js}"></script>
</body>
</html>
