<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title th:text="${pageTitle}">Manage Products — BakeryHub</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css"/>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css"/>
  <link rel="stylesheet" th:href="@{/css/style.css}"/>
</head>
<body style="background:#f8f0eb">

<nav style="background:var(--dark);padding:1rem 2rem;display:flex;align-items:center;justify-content:space-between">
  <a th:href="@{/}" style="font-family:'Playfair Display',serif;font-size:1.4rem;color:var(--accent);text-decoration:none;font-weight:700">🍰 BakeryHub Admin</a>
  <form th:action="@{/auth/logout}" method="post" style="margin:0">
    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
    <button type="submit" style="background:transparent;border:1px solid rgba(255,255,255,.3);color:rgba(255,255,255,.7);padding:.3rem .9rem;border-radius:6px;cursor:pointer;font-size:.85rem">
      <i class="bi bi-box-arrow-right me-1"></i>Logout
    </button>
  </form>
</nav>

<div class="container-fluid" style="max-width:1200px;margin:0 auto;padding:2rem">

  <ul class="nav nav-pills gap-2 mb-4">
    <li class="nav-item"><a class="nav-link" th:href="@{/admin}" style="color:var(--text-muted)">📊 Dashboard</a></li>
    <li class="nav-item"><a class="nav-link active" th:href="@{/admin/products}" style="background:var(--primary)">🍰 Products</a></li>
    <li class="nav-item"><a class="nav-link" th:href="@{/admin/contacts}" style="color:var(--text-main)">✉️ Inquiries</a></li>
    <li class="nav-item ms-auto"><a class="nav-link" th:href="@{/}" style="color:var(--text-muted)">← Back to Site</a></li>
  </ul>

  <div class="d-flex justify-content-between align-items-center mb-4 flex-wrap gap-2">
    <h3 style="font-family:'Playfair Display',serif;font-weight:700;margin:0">All Products</h3>
    <a th:href="@{/admin/products/new}" class="btn-add-cart" style="padding:.6rem 1.3rem">
      <i class="bi bi-plus-lg"></i> Add New Product
    </a>
  </div>

  <div th:if="${successMessage}" class="alert-bakeryhub alert-success-custom">
    <i class="bi bi-check-circle-fill me-2"></i><span th:text="${successMessage}"></span>
  </div>

  <div style="background:#fff;border:1px solid var(--border);border-radius:var(--radius);overflow:hidden">
    <table class="table table-hover mb-0">
      <thead style="background:var(--surface)">
        <tr>
          <th style="padding:.9rem 1rem;width:70px">#</th>
          <th style="padding:.9rem 1rem">Product Name</th>
          <th style="padding:.9rem 1rem">Category</th>
          <th style="padding:.9rem 1rem">Price</th>
          <th style="padding:.9rem 1rem">Stock</th>
          <th style="padding:.9rem 1rem">Status</th>
          <th style="padding:.9rem 1rem">Tags</th>
          <th style="padding:.9rem 1rem;text-align:center">Actions</th>
        </tr>
      </thead>
      <tbody>
        <tr th:if="${products == null or products.isEmpty()}">
          <td colspan="8" style="text-align:center;padding:3rem;color:var(--text-muted)">
            No products yet. <a th:href="@{/admin/products/new}" style="color:var(--primary)">Add your first product!</a>
          </td>
        </tr>
        <tr th:each="product,stat : ${products}">
          <td style="padding:.8rem 1rem;font-size:.85rem;color:var(--text-muted)" th:text="${stat.index + 1}">1</td>
          <td style="padding:.8rem 1rem">
            <div style="display:flex;align-items:center;gap:.7rem">
              <img th:if="${product.imageUrl != null and !#strings.isEmpty(product.imageUrl)}"
                   th:src="${product.imageUrl}" th:alt="${product.name}"
                   style="width:38px;height:38px;object-fit:cover;border-radius:6px;border:1px solid var(--border)"/>
              <span style="font-size:1.5rem" th:unless="${product.imageUrl != null and !#strings.isEmpty(product.imageUrl)}">🍰</span>
              <span style="font-weight:600;font-size:.92rem" th:text="${product.name}">Name</span>
            </div>
          </td>
          <td style="padding:.8rem 1rem;font-size:.88rem" th:text="${product.category}">Category</td>
          <td style="padding:.8rem 1rem;font-weight:700;color:var(--primary)">
            ₹<span th:text="${#numbers.formatDecimal(product.price, 1, 2)}">0</span>
          </td>
          <td style="padding:.8rem 1rem;font-size:.88rem" th:text="${product.stock}">0</td>
          <td style="padding:.8rem 1rem">
            <span th:if="${product.active}"
                  style="background:#e8f5e9;color:#2e7d32;border-radius:50px;padding:.2rem .7rem;font-size:.78rem;font-weight:600">Active</span>
            <span th:unless="${product.active}"
                  style="background:#ffebee;color:#c62828;border-radius:50px;padding:.2rem .7rem;font-size:.78rem;font-weight:600">Inactive</span>
          </td>
          <td style="padding:.8rem 1rem">
            <span th:if="${product.bestSeller}" style="background:var(--accent);color:var(--dark);border-radius:50px;padding:.15rem .6rem;font-size:.72rem;font-weight:700;margin-right:.2rem">★</span>
            <span th:if="${product.eggless}" style="background:#e8f5e9;color:#2e7d32;border-radius:50px;padding:.15rem .6rem;font-size:.72rem;font-weight:700;margin-right:.2rem">🌿EF</span>
            <span th:if="${product.glutenFree}" style="background:#fff3e0;color:#e65100;border-radius:50px;padding:.15rem .6rem;font-size:.72rem;font-weight:700">GF</span>
          </td>
          <td style="padding:.8rem 1rem;text-align:center">
            <div style="display:flex;gap:.5rem;justify-content:center">
              <a th:href="@{/admin/products/edit/{id}(id=${product.id})}"
                 style="background:var(--surface);border:1px solid var(--border);border-radius:6px;padding:.3rem .7rem;text-decoration:none;color:var(--text-main);font-size:.82rem">
                <i class="bi bi-pencil"></i>
              </a>
              <form th:action="@{/admin/products/delete/{id}(id=${product.id})}" method="post"
                    onsubmit="return confirm('Deactivate this product?')">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                <button type="submit" style="background:#ffebee;border:1px solid #ffcdd2;border-radius:6px;padding:.3rem .7rem;cursor:pointer;color:#c62828;font-size:.82rem">
                  <i class="bi bi-trash3"></i>
                </button>
              </form>
            </div>
          </td>
        </tr>
      </tbody>
    </table>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js"></script>
<script th:src="@{/js/main.js}"></script>
</body>
</html>
