<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title th:text="${pageTitle} ?: '500 Server Error — BakeryHub'">500 — BakeryHub</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css"/>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css"/>
  <link rel="stylesheet" th:href="@{/css/style.css}"/>
</head>
<body>
<div th:replace="~{layout/base :: navbar}"></div>

<div class="error-hero">
  <div style="position:relative;text-align:center;padding:3rem;z-index:2">
    <div class="error-code">500</div>
    <div style="font-size:5rem;margin-bottom:1rem;position:relative;z-index:3">⚙️</div>
    <h1 style="font-family:'Playfair Display',serif;font-size:2.5rem;font-weight:700;position:relative;z-index:3"
        th:text="${errorTitle} ?: 'Something Went Wrong'">Something Went Wrong</h1>
    <p style="color:var(--text-muted);margin-top:.8rem;font-size:1rem;max-width:480px;margin-left:auto;margin-right:auto;position:relative;z-index:3"
       th:text="${errorMessage} ?: 'An unexpected error occurred. We\'re on it!'">Error message</p>
    <div class="d-flex gap-3 justify-content-center mt-4" style="position:relative;z-index:3">
      <a th:href="@{/}" class="btn-hero-primary"><i class="bi bi-house-fill me-2"></i>Go Home</a>
      <a href="javascript:history.back()" class="btn-hero-secondary"><i class="bi bi-arrow-left me-2"></i>Go Back</a>
    </div>
  </div>
</div>

<div th:replace="~{layout/base :: footer}"></div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js"></script>
<script th:src="@{/js/main.js}"></script>
</body>
</html>
