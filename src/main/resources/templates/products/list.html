<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title th:text="${pageTitle} ?: 'Products — BakeryHub'">Products — BakeryHub</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css"/>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css"/>
  <link rel="stylesheet" th:href="@{/css/style.css}"/>
</head>
<body>
<div th:replace="~{layout/base :: navbar}"></div>

<!-- Page Header -->
<div style="background:linear-gradient(135deg, var(--dark), var(--dark-2));padding:3rem 0;">
  <div class="container">
    <h1 style="font-family:'Playfair Display',serif;color:#fff;font-size:2rem;margin-bottom:.5rem"
        th:text="${pageTitle} ?: 'All Products'">All Products</h1>
    <nav aria-label="breadcrumb">
      <ol class="breadcrumb mb-0" style="--bs-breadcrumb-divider-color:rgba(255,255,255,.4)">
        <li class="breadcrumb-item"><a th:href="@{/}" style="color:var(--accent)">Home</a></li>
        <li class="breadcrumb-item active" style="color:rgba(255,255,255,.6)">Products</li>
      </ol>
    </nav>
  </div>
</div>

<section class="section-pad">
  <div class="container">

    <!-- Flash -->
    <div th:if="${successMessage}" class="alert-bakeryhub alert-success-custom">
      <i class="bi bi-check-circle-fill me-2"></i><span th:text="${successMessage}"></span>
    </div>

    <!-- Filter Tabs + Result Count -->
    <div class="d-flex flex-wrap justify-content-between align-items-center mb-4 gap-3">
      <div class="filter-tabs-wrap">
        <a th:href="@{/products}" class="filter-tab"
           th:classappend="${currentFilter == null and currentSearch == null} ? ' active' : ''">All</a>
        <a th:href="@{/products(filter='best-sellers')}" class="filter-tab"
           th:classappend="${currentFilter == 'best-sellers'} ? ' active' : ''">★ Best Sellers</a>
        <a th:href="@{/products(filter='eggless')}" class="filter-tab"
           th:classappend="${currentFilter == 'eggless'} ? ' active' : ''">🌿 Eggless</a>
        <a th:href="@{/products(filter='gluten-free')}" class="filter-tab"
           th:classappend="${currentFilter == 'gluten-free'} ? ' active' : ''">🌾 Gluten-Free</a>
        <a th:href="@{/products(filter='Cake')}" class="filter-tab"
           th:classappend="${currentFilter == 'Cake'} ? ' active' : ''">🎂 Cakes</a>
        <a th:href="@{/products(filter='Brownie')}" class="filter-tab"
           th:classappend="${currentFilter == 'Brownie'} ? ' active' : ''">🍫 Brownies</a>
        <a th:href="@{/products(filter='Cupcake')}" class="filter-tab"
           th:classappend="${currentFilter == 'Cupcake'} ? ' active' : ''">🧁 Cupcakes</a>
      </div>
      <div style="color:var(--text-muted);font-size:.88rem">
        <i class="bi bi-grid3x3-gap me-1"></i>
        <span th:text="${products != null} ? ${products.size()} + ' items' : '0 items'">0 items</span>
      </div>
    </div>

    <!-- Product Grid -->
    <div class="row g-4" th:if="${products != null and !products.isEmpty()}">
      <div class="col-sm-6 col-lg-4 col-xl-3" th:each="product : ${products}">
        <div class="product-card">
          <div class="product-card-img-wrap">
            <img th:if="${product.imageUrl != null and !#strings.isEmpty(product.imageUrl)}"
                 th:src="${product.imageUrl}" th:alt="${product.name}" loading="lazy"/>
            <div th:unless="${product.imageUrl != null and !#strings.isEmpty(product.imageUrl)}"
                 class="product-img-placeholder">🍰</div>
            <span th:if="${product.bestSeller}" class="product-badge badge-bestseller">★ Best Seller</span>
            <span th:if="${product.eggless}" class="product-badge badge-eggless"
                  th:style="${product.bestSeller} ? 'top:44px' : 'top:12px'">Eggless</span>
            <span th:if="${product.glutenFree}" class="product-badge badge-glutenfree"
                  th:style="${product.bestSeller or product.eggless} ? 'top:76px' : 'top:12px'">GF</span>
          </div>
          <div class="product-card-body">
            <div class="product-card-title" th:text="${product.name}">Product Name</div>
            <div class="product-card-desc" th:text="${product.description}">Description</div>
            <div class="product-card-price">
              ₹<span th:text="${#numbers.formatDecimal(product.price, 1, 2)}">0.00</span>
              <small> / piece</small>
            </div>
          </div>
          <div class="product-card-footer">
            <form th:action="@{/cart/add}" method="post" style="flex:1">
              <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
              <input type="hidden" name="productId" th:value="${product.id}"/>
              <input type="hidden" name="quantity" value="1"/>
              <button type="submit" class="btn-add-cart" data-cart-btn>
                <i class="bi bi-cart-plus"></i> Add to Cart
              </button>
            </form>
            <a th:href="@{/products/{id}(id=${product.id})}" class="btn-view-detail">
              <i class="bi bi-eye"></i>
            </a>
          </div>
        </div>
      </div>
    </div>

    <!-- Empty state -->
    <div th:if="${products == null or products.isEmpty()}" class="text-center py-5">
      <div style="font-size:5rem">🔍</div>
      <h4 class="mt-3" style="font-family:'Playfair Display',serif">No Products Found</h4>
      <p class="text-muted">Try a different search term or browse all products.</p>
      <a th:href="@{/products}" class="btn-hero-primary mt-3 d-inline-flex">Browse All Products</a>
    </div>

  </div>
</section>

<div th:replace="~{layout/base :: footer}"></div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js"></script>
<script th:src="@{/js/main.js}"></script>
</body>
</html>
