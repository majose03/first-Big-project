<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title th:text="${pageTitle}">Product Details — BakeryHub</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css"/>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css"/>
  <link rel="stylesheet" th:href="@{/css/style.css}"/>
</head>
<body>
<div th:replace="~{layout/base :: navbar}"></div>

<section class="section-pad">
  <div class="container">
    <nav aria-label="breadcrumb" class="mb-4">
      <ol class="breadcrumb">
        <li class="breadcrumb-item"><a th:href="@{/}" style="color:var(--primary)">Home</a></li>
        <li class="breadcrumb-item"><a th:href="@{/products}" style="color:var(--primary)">Products</a></li>
        <li class="breadcrumb-item active" th:text="${product.name}">Product</li>
      </ol>
    </nav>

    <div class="row g-5 align-items-start">
      <!-- Product Image -->
      <div class="col-lg-5">
        <div style="border-radius:var(--radius);overflow:hidden;border:1px solid var(--border);background:var(--surface);">
          <img th:if="${product.imageUrl != null and !#strings.isEmpty(product.imageUrl)}"
               th:src="${product.imageUrl}" th:alt="${product.name}"
               style="width:100%;height:400px;object-fit:cover;display:block"/>
          <div th:unless="${product.imageUrl != null and !#strings.isEmpty(product.imageUrl)}"
               style="height:400px;display:flex;align-items:center;justify-content:center;font-size:8rem;background:linear-gradient(135deg,#fdf0e8,#fce4d1)">🍰</div>
        </div>
        <!-- Badges -->
        <div class="d-flex gap-2 flex-wrap mt-3">
          <span th:if="${product.bestSeller}" class="product-badge badge-bestseller" style="position:static">★ Best Seller</span>
          <span th:if="${product.eggless}" class="product-badge badge-eggless" style="position:static">🌿 Eggless</span>
          <span th:if="${product.glutenFree}" class="product-badge badge-glutenfree" style="position:static">🌾 Gluten-Free</span>
        </div>
      </div>

      <!-- Product Info -->
      <div class="col-lg-7">
        <span style="font-size:.8rem;font-weight:600;letter-spacing:1px;text-transform:uppercase;color:var(--primary)"
              th:text="${product.category}">Category</span>
        <h1 style="font-family:'Playfair Display',serif;font-size:2.3rem;font-weight:700;margin:.5rem 0 1rem"
            th:text="${product.name}">Product Name</h1>

        <div style="display:flex;align-items:baseline;gap:.5rem;margin-bottom:1.5rem">
          <span style="font-family:'Playfair Display',serif;font-size:2.2rem;color:var(--primary);font-weight:700">
            ₹<span th:text="${#numbers.formatDecimal(product.price, 1, 2)}">0.00</span>
          </span>
          <span style="color:var(--text-muted);font-size:.9rem">per piece</span>
        </div>

        <p style="color:var(--text-muted);line-height:1.8;font-size:1rem;margin-bottom:2rem"
           th:text="${product.description}">Description goes here.</p>

        <!-- Stock indicator -->
        <div class="mb-3" th:if="${product.stock != null}">
          <span th:if="${product.stock > 0}" style="color:#2e7d32;font-weight:600;font-size:.9rem">
            <i class="bi bi-check-circle-fill me-1"></i>
            <span th:text="${product.stock}">0</span> in stock
          </span>
          <span th:unless="${product.stock > 0}" style="color:#c62828;font-weight:600;font-size:.9rem">
            <i class="bi bi-x-circle-fill me-1"></i> Out of stock
          </span>
        </div>

        <!-- Add to Cart Form -->
        <form th:action="@{/cart/add-from-detail}" method="post">
          <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
          <input type="hidden" name="productId" th:value="${product.id}"/>
          <div class="d-flex align-items-center gap-3 mb-3">
            <label style="font-weight:600">Qty:</label>
            <input type="number" name="quantity" value="1" min="1" max="20" class="quantity-input"/>
          </div>
          <div class="d-flex gap-3 flex-wrap">
            <button type="submit" class="btn-add-cart" style="padding:.7rem 2rem;font-size:1rem">
              <i class="bi bi-cart-plus"></i> Add to Cart
            </button>
            <a th:href="@{/products}" style="text-decoration:none">
              <button type="button" class="btn-view-detail" style="padding:.7rem 1.2rem;font-size:.95rem">
                <i class="bi bi-arrow-left me-1"></i> Back
              </button>
            </a>
          </div>
        </form>

        <!-- Info Pills -->
        <div class="d-flex flex-wrap gap-2 mt-4" style="border-top:1px solid var(--border);padding-top:1.5rem">
          <span style="background:var(--surface);border:1px solid var(--border);border-radius:50px;padding:.3rem .9rem;font-size:.8rem;color:var(--text-muted)">
            🚚 Free delivery on orders ₹500+
          </span>
          <span style="background:var(--surface);border:1px solid var(--border);border-radius:50px;padding:.3rem .9rem;font-size:.8rem;color:var(--text-muted)">
            📦 Delivered fresh same day
          </span>
          <span style="background:var(--surface);border:1px solid var(--border);border-radius:50px;padding:.3rem .9rem;font-size:.8rem;color:var(--text-muted)">
            ✅ 100% fresh guarantee
          </span>
        </div>
      </div>
    </div>
  </div>
</section>

<div th:replace="~{layout/base :: footer}"></div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js"></script>
<script th:src="@{/js/main.js}"></script>
</body>
</html>
