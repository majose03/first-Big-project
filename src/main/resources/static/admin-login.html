<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>CRUMB Admin &mdash; Login</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet"/>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{background:#08070a;min-height:100vh;display:flex;align-items:center;justify-content:center;font-family:'Inter',sans-serif;overflow:hidden;}
.bg-orbs{position:fixed;inset:0;pointer-events:none;}
.orb{position:absolute;border-radius:50%;filter:blur(80px);opacity:.18;}
.orb1{width:500px;height:500px;background:radial-gradient(circle,#7c5cbf,transparent);top:-100px;right:-100px;animation:drift 8s ease-in-out infinite;}
.orb2{width:400px;height:400px;background:radial-gradient(circle,#d4a84b,transparent);bottom:-80px;left:-80px;animation:drift 10s ease-in-out infinite reverse;}
@keyframes drift{0%,100%{transform:translate(0,0);}50%{transform:translate(30px,-30px);}}
.card{background:rgba(255,255,255,0.03);border:1px solid rgba(124,92,191,.25);backdrop-filter:blur(30px);border-radius:28px;padding:48px 44px;width:100%;max-width:420px;position:relative;z-index:1;box-shadow:0 30px 80px rgba(0,0,0,.5);}
.logo{font-family:'Cormorant Garamond',serif;font-size:2.2rem;font-weight:700;background:linear-gradient(135deg,#d4a84b,#f5c842);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;letter-spacing:4px;text-align:center;margin-bottom:6px;}
.sub{text-align:center;color:#8b82a0;font-size:.78rem;letter-spacing:2px;text-transform:uppercase;margin-bottom:36px;}
.shield{text-align:center;font-size:2.5rem;margin-bottom:24px;}
label{display:block;font-size:.7rem;font-weight:600;letter-spacing:1.2px;text-transform:uppercase;color:#7c5cbf;margin-bottom:7px;}
.inp-wrap{position:relative;margin-bottom:20px;}
input[type=password],input[type=text]{width:100%;background:rgba(255,255,255,.05);border:1.5px solid rgba(124,92,191,.25);border-radius:12px;color:#e2ddef;padding:13px 48px 13px 16px;font-size:.9rem;font-family:'Inter',sans-serif;transition:border-color .25s,box-shadow .25s;outline:none;}
input:focus{border-color:#a17fe0;box-shadow:0 0 0 3px rgba(124,92,191,.2);}
.eye-btn{position:absolute;right:14px;top:50%;transform:translateY(-50%);background:none;border:none;color:#8b82a0;cursor:pointer;font-size:1.1rem;padding:4px;transition:color .2s;}
.eye-btn:hover{color:#a17fe0;}
.login-btn{width:100%;background:linear-gradient(135deg,#7c5cbf,#a17fe0);color:#fff;border:none;padding:15px;border-radius:50px;font-weight:700;font-size:.9rem;cursor:pointer;transition:transform .2s,box-shadow .2s;margin-top:4px;letter-spacing:.5px;}
.login-btn:hover{transform:translateY(-2px);box-shadow:0 10px 30px rgba(124,92,191,.5);}
.login-btn:active{transform:translateY(0);}
.login-btn:disabled{opacity:.6;cursor:not-allowed;transform:none;}
.err-msg{background:rgba(224,92,92,.1);border:1px solid rgba(224,92,92,.3);color:#ff8888;padding:11px 16px;border-radius:10px;font-size:.82rem;margin-top:14px;display:none;text-align:center;}
.hint{text-align:center;color:#6b617e;font-size:.72rem;margin-top:20px;line-height:1.6;}
.back-link{display:block;text-align:center;color:#8b82a0;font-size:.75rem;text-decoration:none;margin-top:20px;transition:color .2s;}
.back-link:hover{color:#d4a84b;}
.lock-icon{font-size:.85rem;margin-right:4px;}
/* Shake animation on wrong password */
@keyframes shake{0%,100%{transform:translateX(0);}20%,60%{transform:translateX(-8px);}40%,80%{transform:translateX(8px);}}
.shake{animation:shake .4s ease;}
</style>
</head>
<body>
<div class="bg-orbs">
  <div class="orb orb1"></div>
  <div class="orb orb2"></div>
</div>
<div class="card" id="loginCard">
  <div class="shield">&#x1F512;</div>
  <div class="logo">CRUMB</div>
  <div class="sub">Admin Access</div>
  <form id="loginForm">
    <label>&#x1F511; Admin Password</label>
    <div class="inp-wrap">
      <input type="password" id="pwInput" placeholder="Enter admin password" autocomplete="current-password" autofocus/>
      <button type="button" class="eye-btn" id="eyeBtn" title="Show/Hide">&#x1F441;</button>
    </div>
    <button type="submit" class="login-btn" id="loginBtn">&#x1F512; Login to Admin Panel</button>
    <div class="err-msg" id="errMsg">&#x26A0; Incorrect password. Please try again.</div>
  </form>
  <div class="hint">
    <span class="lock-icon">&#x1F510;</span>This page is protected.<br/>
    Only authorized personnel may access the admin panel.
  </div>
  <a class="back-link" href="/">&larr; Back to Store</a>
</div>

<script>
// Admin password — change this to YOUR strong password
var ADMIN_PASSWORD = 'Crumb@2025!';
var ADMIN_TOKEN    = 'crumb_admin_v2_auth';

// Already logged in? Redirect immediately
if (localStorage.getItem(ADMIN_TOKEN) === 'ok') {
  window.location.href = '/admin.html';
}

// Show / hide password
document.getElementById('eyeBtn').addEventListener('click', function() {
  var inp = document.getElementById('pwInput');
  if (inp.type === 'password') {
    inp.type = 'text';
    this.innerHTML = '&#x1F648;';
  } else {
    inp.type = 'password';
    this.innerHTML = '&#x1F441;';
  }
});

// Login form
document.getElementById('loginForm').addEventListener('submit', function(e) {
  e.preventDefault();
  var pw  = document.getElementById('pwInput').value;
  var btn = document.getElementById('loginBtn');
  var err = document.getElementById('errMsg');

  if (pw === ADMIN_PASSWORD) {
    btn.textContent = '\u2713 Logging in\u2026';
    btn.disabled = true;
    localStorage.setItem(ADMIN_TOKEN, 'ok');
    setTimeout(function(){ window.location.href = '/admin.html'; }, 600);
  } else {
    // Wrong password
    err.style.display = 'block';
    document.getElementById('loginCard').classList.add('shake');
    setTimeout(function(){
      document.getElementById('loginCard').classList.remove('shake');
    }, 400);
    document.getElementById('pwInput').value = '';
    document.getElementById('pwInput').focus();
  }
});
</script>
</body>
</html>
