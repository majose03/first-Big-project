<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CRUMB - Admin Login</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #0a0604;
      --bg2: #1a1008;
      --gold: #d4a84b;
      --gold2: #f5c842;
      --text: #ede3d5;
      --muted: #9e8a72;
      --gb: rgba(212, 168, 75, 0.15);
      --glass: rgba(255, 255, 255, 0.04);
    }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Inter', sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      margin: 0;
    }
    .login-box {
      background: var(--bg2);
      border: 1px solid var(--gb);
      border-radius: 16px;
      padding: 40px;
      width: 100%;
      max-width: 380px;
      text-align: center;
      box-shadow: 0 10px 30px rgba(0,0,0,0.5);
    }
    .logo {
      font-size: 2rem;
      font-weight: 700;
      background: linear-gradient(135deg, var(--gold), var(--gold2));
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
      letter-spacing: 3px;
      margin-bottom: 5px;
    }
    p { color: var(--muted); font-size: 0.9rem; margin-bottom: 30px; }
    input {
      width: 100%;
      background: var(--glass);
      border: 1px solid var(--gb);
      border-radius: 8px;
      padding: 12px 16px;
      color: var(--text);
      font-size: 1rem;
      font-family: 'Inter', sans-serif;
      margin-bottom: 20px;
      box-sizing: border-box;
      outline: none;
      transition: border-color 0.2s;
    }
    input:focus { border-color: var(--gold); }
    button {
      width: 100%;
      background: linear-gradient(135deg, var(--gold), var(--gold2));
      color: #0a0604;
      padding: 12px;
      border: none;
      border-radius: 8px;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      transition: transform 0.2s;
    }
    button:hover { transform: translateY(-2px); }
    .error { color: #f44336; font-size: 0.85rem; margin-top: 15px; display: none; }
  </style>
</head>
<body>
  <div class="login-box">
    <div class="logo">CRUMB</div>
    <p>Admin Panel Access</p>
    <form onsubmit="handleLogin(event)">
      <input type="password" id="adminPwd" placeholder="Enter Admin Password" required />
      <button type="submit">Login</button>
      <div id="errorMsg" class="error">Incorrect password. Please try again.</div>
    </form>
  </div>
  <script>
    // Redirect if already logged in
    if (localStorage.getItem('crumb_admin_v3_auth') === 'ok') {
      window.location.replace('/admin.html');
    }

    function handleLogin(e) {
      e.preventDefault();
      var pwd = document.getElementById('adminPwd').value;
      if (pwd === 'Crumb@2025!') {
        localStorage.setItem('crumb_admin_v3_auth', 'ok');
        window.location.replace('/admin.html');
      } else {
        document.getElementById('errorMsg').style.display = 'block';
        document.getElementById('adminPwd').value = '';
      }
    }
  </script>
</body>
</html>
